services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gestion_equipos}
    ports:
      - "5433:5432"   
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      MONGO_URI: mongodb://mongo:27017
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api

seeder:
    image: alpine:latest
    depends_on:
      - api
    volumes:
      # Asegúrate de que esta ruta coincida con la ubicación real de tu script
      - ./scripts/seed_demo.sh:/seed_demo.sh 
    environment:
      # Sobreescribimos la variable de tu script. 
      # Dentro de Docker, localhost no funciona para ver a otros contenedores.
      API: "http://api:8000/api" 
    command: >
      sh -c "
      apk add --no-cache bash curl jq python3 &&
      echo 'Esperando a que la API esté lista...' &&
      while ! curl -s http://api:8000 > /dev/null; do sleep 3; done;
      echo 'API activa. Ejecutando seed...' &&
      bash /seed_demo.sh
      "
      
volumes:
  pg_data:
  mongo_data:
